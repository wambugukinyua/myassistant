# myassistant — docker-compose for local development / self-hosted deployment
# Copy .env.example to .env and fill in your secrets before running.
#
# Usage:
#   docker compose up -d
#   docker compose logs -f myassistant

services:
  myassistant:
    image: ghcr.io/wambugukinyua/myassistant:latest
    # Build locally when the ghcr.io image is not yet available:
    # build:
    #   context: .
    #   args:
    #     ZEROCLAW_VERSION: v0.5.7
    #     ZEROCLAW_CARGO_FEATURES: "whatsapp-web"
    container_name: myassistant
    restart: unless-stopped

    ports:
      - "42617:42617"   # zeroclaw gateway / webhook receiver
      - "${FILEBROWSER_PORT:-8080}:8080"  # FileBrowser web UI

    environment:
      # ── LLM provider (required) ─────────────────────────────────────────────
      PROVIDER: ${PROVIDER:-openai}
      ZEROCLAW_MODEL: ${ZEROCLAW_MODEL:-gpt-4o}
      API_KEY: ${API_KEY}

      # ── WhatsApp Cloud API (required for webhook-based WhatsApp) ─────────────
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET:-}

      # ── Runtime paths ────────────────────────────────────────────────────────
      ZEROCLAW_WORKSPACE: /zeroclaw-data/workspace
      ZEROCLAW_GATEWAY_PORT: 42617
      ZEROCLAW_CHANNELS: whatsapp

      # ── Display (needed by scrot / browser tools) ────────────────────────────
      DISPLAY: ":99"

      # ── FileBrowser ──────────────────────────────────────────────────────────
      # Admin credentials for the FileBrowser web UI.
      # Set these before the first run; they are written into the database once
      # and are not updated on subsequent container restarts.
      FILEBROWSER_ADMIN_USER: ${FILEBROWSER_ADMIN_USER:-admin}
      FILEBROWSER_ADMIN_PASSWORD: ${FILEBROWSER_ADMIN_PASSWORD:-admin}

    volumes:
      # Persist conversation state, skills and WhatsApp Web session
      - zeroclaw-data:/zeroclaw-data
      # Mount your own config to override defaults:
      # - ./config/config.toml:/zeroclaw-data/.zeroclaw/config.toml:ro

    # Virtual frame buffer for headless Chrome / scrot
    # (Remove if you do not need browser-automation or screenshot tools)
    entrypoint:
      - /bin/bash
      - -c
      - |
        # ── Virtual frame buffer (headless Chrome / scrot) ──────────────────
        Xvfb :99 -screen 0 1280x1024x24 &

        # ── FileBrowser ──────────────────────────────────────────────────────
        # Initialise the database on first run so credentials are persisted
        # across container restarts (stored in the zeroclaw-data volume).
        _FB_DB=/zeroclaw-data/.filebrowser.db
        _FB_USER="${FILEBROWSER_ADMIN_USER:-admin}"
        _FB_PASS="${FILEBROWSER_ADMIN_PASSWORD:-admin}"
        if [ ! -f "${_FB_DB}" ]; then
          filebrowser config init    --database "${_FB_DB}"
          filebrowser config set     --database "${_FB_DB}" \
            --address 0.0.0.0 --port 8080 --root /zeroclaw-data
          # Credentials are set via FILEBROWSER_ADMIN_USER / FILEBROWSER_ADMIN_PASSWORD.
          # Set these in your .env file before first run. Change them immediately
          # in the UI or with:
          #   docker exec -it myassistant filebrowser users update <user> \
          #     --password <new-password> --database /zeroclaw-data/.filebrowser.db
          filebrowser users add "${_FB_USER}" "${_FB_PASS}" \
            --perm.admin --database "${_FB_DB}"
        fi
        filebrowser --database "${_FB_DB}" &

        exec zeroclaw gateway

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:42617/"]
      interval: 60s
      timeout: 10s
      start_period: 15s
      retries: 3

volumes:
  zeroclaw-data:
    driver: local
