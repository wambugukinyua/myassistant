name: Build and Publish Docker Image

# Builds the myassistant image and pushes it to GitHub Container Registry
# (ghcr.io/wambugukinyua/myassistant).
#
# Triggers:
#   • Every push to main / master
#   • Every semver tag  (v*)
#   • Every pull-request targeting main / master  (build-only, no push)
#   • Manual dispatch from the Actions tab

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      zeroclaw_version:
        description: "zeroclaw release tag to build (e.g. v0.5.7)"
        required: false
        default: "v0.5.7"
      extra_features:
        description: "Additional Cargo features (comma-separated)"
        required: false
        default: ""

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & push to ghcr.io
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # needed to push to ghcr.io

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up QEMU (multi-arch support) ──────────────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── 3. Set up Docker Buildx ───────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 4. Authenticate to GitHub Container Registry ─────────────────────────
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 5. Derive image tags & labels ─────────────────────────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Branch-based tags
            type=ref,event=branch
            # PR tags (not pushed, just labelled)
            type=ref,event=pr
            # Semver tags  →  vX.Y.Z, vX.Y, vX
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # "latest" only on the default branch
            type=raw,value=latest,enable={{is_default_branch}}

      # ── 6. Resolve build-args ─────────────────────────────────────────────────
      - name: Resolve build arguments
        id: build_args
        run: |
          VERSION="${{ github.event.inputs.zeroclaw_version || 'v0.5.7' }}"
          EXTRA="${{ github.event.inputs.extra_features }}"
          FEATURES="whatsapp-web"
          if [[ -n "$EXTRA" ]]; then
            FEATURES="${FEATURES},${EXTRA}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "features=${FEATURES}" >> "$GITHUB_OUTPUT"

      # ── 7. Build (and push on non-PR events) ─────────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ZEROCLAW_VERSION=${{ steps.build_args.outputs.version }}
            ZEROCLAW_CARGO_FEATURES=${{ steps.build_args.outputs.features }}
          # Use GitHub Actions cache to speed up Rust compilation
          cache-from: type=gha
          cache-to: type=gha,mode=max
